<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Diktat</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{background:transparent;overflow:hidden;height:100%}
        .box{background:rgba(15,23,42,.95);border:1px solid rgba(71,85,105,.5);border-radius:10px;padding:14px;height:100%;display:flex;flex-direction:column;font-family:-apple-system,sans-serif;color:#f1f5f9;backdrop-filter:blur(10px)}
        .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;-webkit-app-region:drag}
        .title{font-size:11px;font-weight:600;text-transform:uppercase;color:#94a3b8;display:flex;align-items:center;gap:6px}
        .dot{width:7px;height:7px;background:#22c55e;border-radius:50%;animation:pulse 2s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
        .close{-webkit-app-region:no-drag;background:none;border:none;color:#94a3b8;cursor:pointer;font-size:16px;padding:2px}
        .close:hover{color:#f1f5f9}
        .text{flex:1;overflow-y:auto;font-size:16px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
        .text.empty{color:#64748b;font-style:italic}
    </style>
</head>
<body>
    <div class="box">
        <div class="header"><div class="title"><span class="dot"></span><span>Diktat</span></div><button class="close" id="closeBtn">×</button></div>
        <div class="text empty" id="text">Warten auf Diktat...</div>
    </div>
    <script>
        const { ipcRenderer } = require('electron');
        ipcRenderer.on('update-text', (e, t) => {
            const el = document.getElementById('text');
            if (t) { el.textContent = t; el.classList.remove('empty'); el.scrollTop = el.scrollHeight; }
            else { el.textContent = 'Warten auf Diktat...'; el.classList.add('empty'); }
        });
        document.getElementById('closeBtn').addEventListener('click', () => ipcRenderer.send('hide-text-window'));
    </script>
</body>
</html>
