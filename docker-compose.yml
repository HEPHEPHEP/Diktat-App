version: '3.8'

services:
  # License Server (PHP) — NUR intern erreichbar!
  license-server:
    image: php:8.2-apache
    container_name: dictation-license
    # KEIN "ports:" — nur über das interne Docker-Netzwerk erreichbar
    expose:
      - "80"
    volumes:
      - ./license-server:/var/www/html
      - license-data:/var/www/html/data
    environment:
      - LICENSE_API_SECRET=${LICENSE_API_SECRET:?LICENSE_API_SECRET muss in .env gesetzt sein}
    restart: unless-stopped

  # Main Server (API + WebSocket)
  server:
    build: ./server
    container_name: dictation-server
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET muss in .env gesetzt sein}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD muss in .env gesetzt sein}
      - DATA_DIR=/app/data
      - LICENSE_SERVER_URL=http://license-server/api.php
      - LICENSE_SERVER_SECRET=${LICENSE_API_SECRET:?LICENSE_API_SECRET muss in .env gesetzt sein}
      - SERVER_ID=${SERVER_ID:-server-001}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:8081,http://localhost:8082}
    volumes:
      - server-data:/app/data
    restart: unless-stopped
    depends_on:
      - license-server

  # Mobile Web App (Static Files)
  mobile-app:
    image: nginx:alpine
    container_name: dictation-mobile
    ports:
      - "8081:80"
    volumes:
      - ./mobile-app:/usr/share/nginx/html:ro
      - ./nginx-mobile.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    depends_on:
      - server

  # Admin Tool (Static Files)
  admin-tool:
    image: nginx:alpine
    container_name: dictation-admin
    ports:
      - "8082:80"
    volumes:
      - ./admin-tool:/usr/share/nginx/html:ro
    restart: unless-stopped
    depends_on:
      - server

volumes:
  license-data:
    name: dictation-license-data
  server-data:
    name: dictation-server-data
